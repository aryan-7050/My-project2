<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real-Time Poll App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f3f4f6;
        }
        .bar {
            transition: width 0.5s ease-in-out;
        }
    </style>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen p-4">

    <div id="poll-container" class="bg-white rounded-2xl shadow-xl w-full max-w-2xl p-8 transform transition-all duration-300 hover:scale-105">
        <h1 class="text-3xl font-bold text-gray-800 text-center mb-6">Voting Machine</h1>
        <p class="text-xl text-gray-600 mb-8 text-center" id="poll-question"></p>
        
        <div id="options-container" class="space-y-4">
        </div>

        <div id="results-container" class="mt-8 border-t-2 pt-6 border-gray-200">
            <h2 class="text-2xl font-semibold text-gray-800 mb-4 text-center">Live Results</h2>
            <div id="results-list" class="space-y-4">

            </div>
        </div>
    </div>

    <script>
        const questionElement = document.getElementById('poll-question');
        const optionsContainer = document.getElementById('options-container');
        const resultsList = document.getElementById('results-list');
        
        let pollData = {};
        
        const ws = new WebSocket('ws://localhost:8080');

        ws.onopen = () => {
            console.log("Connected to WebSocket server");
        };

        ws.onmessage = (event) => {
            const data = JSON.parse(event.data);
            if (data.type === 'initial_data' || data.type === 'vote_update') {
                pollData = data.pollData;
                renderPoll();
                renderResults();
            }
        };

        ws.onclose = () => {
            console.log("Disconnected from WebSocket server. Attempting to reconnect...");
            setTimeout(() => {
                window.location.reload();
            }, 5000);
        };
        
        function renderPoll() {
            questionElement.textContent = pollData.question;
            optionsContainer.innerHTML = '';
            
            pollData.options.forEach((option, index) => {
                const button = document.createElement('button');
                button.textContent = option.text;
                button.className = "w-full bg-blue-500 hover:bg-blue-600 text-white font-semibold py-3 px-6 rounded-xl transition-colors duration-300 shadow-md transform hover:shadow-lg focus:outline-none focus:ring-4 focus:ring-blue-300";
                button.onclick = () => castVote(index);
                optionsContainer.appendChild(button);
            });
        }
        
        function renderResults() {
            const totalVotes = Object.values(pollData.votes).reduce((sum, count) => sum + count, 0);
            resultsList.innerHTML = '';

            pollData.options.forEach((option, index) => {
                const votes = pollData.votes[index] || 0;
                const percentage = totalVotes > 0 ? (votes / totalVotes) * 100 : 0;
                
                const resultItem = document.createElement('div');
                resultItem.className = "p-4 bg-gray-50 rounded-lg shadow-sm";
                resultItem.innerHTML = `
                    <div class="flex justify-between items-center mb-2">
                        <span class="text-gray-700 font-medium">${option.text}</span>
                        <span class="text-gray-700 font-bold">${votes} votes (${percentage.toFixed(1)}%)</span>
                    </div>
                    <div class="w-full bg-gray-200 rounded-full h-4">
                        <div class="bg-indigo-500 h-4 rounded-full bar" style="width: ${percentage}%"></div>
                    </div>
                `;
                resultsList.appendChild(resultItem);
            });
        }

        function castVote(optionIndex) {
            if (ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({ type: 'vote', optionIndex }));
            }
        }
    </script>
    
    <script>
       
    </script>
</body>
</html>
